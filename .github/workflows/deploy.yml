# Despliegue automático a Namecheap por SSH (rsync) al hacer push a main.
#
# Secrets → Settings → Secrets and variables → Actions:
#   SSH_HOST         → Host SSH (ej. serverNNN.hosting.com o IP de Namecheap)
#   SSH_USER         → Usuario SSH (cPanel)
#   SSH_PATH         → Ruta absoluta del proyecto en el servidor (sin barra final), ej. /home/USUARIO/factura.liversoft.com
#   SSH_PRIVATE_KEY  → Clave privada completa (PEM), la pública en ~/.ssh/authorized_keys del servidor
#   SSH_PORT         → (opcional) Puerto SSH; en Stellar suele ser 21098. Si no lo defines, se usa 22.
#   SSH_PHP          → (opcional) Binario PHP en el servidor si `php` no es 8.x, ej. /usr/local/bin/ea-php80
#
# Sin --delete en rsync: no se borran en el servidor ficheros que no existen en el repo (p. ej. subidas en storage).
# El .env no se sube (está en rsync-exclude); debe existir solo en el servidor.
# Document root del dominio en cPanel: .../public

name: Deploy to Namecheap

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-namecheap
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.0"
          extensions: mbstring, dom, fileinfo, pdo_mysql, zip, gd, intl, bcmath, exif, calendar
          coverage: none
          tools: composer:v2

      - name: .env temporal para CI
        run: |
          cp .env.example .env
          KEY="base64:$(openssl rand -base64 32 | tr -d '\n')"
          sed -i "s|^APP_KEY=.*|APP_KEY=${KEY}|" .env

      - name: Composer (producción)
        run: composer install --no-dev --optimize-autoloader --no-interaction --ignore-platform-reqs

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: NPM build
        run: |
          npm ci
          npm run production

      - name: ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # Normaliza espacios/saltos y valida que SSH_HOST sea solo hostname o IP (getaddrinfo falla si hay URL o ruta).
      - name: Comprobar secrets SSH
        env:
          SSH_HOST_IN: ${{ secrets.SSH_HOST }}
          SSH_USER_IN: ${{ secrets.SSH_USER }}
          SSH_PATH_IN: ${{ secrets.SSH_PATH }}
          SSH_PORT_IN: ${{ secrets.SSH_PORT }}
        run: |
          trim() { printf '%s' "$1" | tr -d '\r\n' | xargs; }
          H=$(trim "$SSH_HOST_IN")
          U=$(trim "$SSH_USER_IN")
          R=$(trim "$SSH_PATH_IN")
          PI=$(trim "$SSH_PORT_IN")
          [ -z "$PI" ] && PI=22
          if [ -z "$H" ]; then echo "::error::SSH_HOST vacío. Debe ser solo el hostname o la IP (ej. server123.hosting.com), sin https://"; exit 1; fi
          case "$H" in *://*|*/*)
            echo "::error::SSH_HOST no debe ser una URL ni una ruta. Usa solo hostname o IP en SSH_HOST; la carpeta del proyecto va en SSH_PATH."
            exit 1
            ;;
          esac
          if [ -z "$U" ]; then echo "::error::SSH_USER vacío"; exit 1; fi
          if [ -z "$R" ]; then echo "::error::SSH_PATH vacío"; exit 1; fi
          echo "SSH_HOST=$H" >> "$GITHUB_ENV"
          echo "SSH_USER=$U" >> "$GITHUB_ENV"
          echo "SSH_PATH=$R" >> "$GITHUB_ENV"
          echo "SSH_PORT=$PI" >> "$GITHUB_ENV"

      - name: Known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Rsync a servidor
        run: |
          rsync -avz \
            -e "ssh -p $SSH_PORT -o StrictHostKeyChecking=yes" \
            --exclude-from=deploy/rsync-exclude.txt \
            ./ "${SSH_USER}@${SSH_HOST}:${SSH_PATH}/"

      - name: Artisan en servidor (cachés)
        env:
          SSH_PHP: ${{ secrets.SSH_PHP }}
        run: |
          PHP_BIN="${SSH_PHP:-php}"
          ssh -p "$SSH_PORT" -o StrictHostKeyChecking=yes "${SSH_USER}@${SSH_HOST}" \
            "cd '${SSH_PATH}' && ${PHP_BIN} artisan migrate --force && ${PHP_BIN} artisan config:cache && ${PHP_BIN} artisan view:cache"
