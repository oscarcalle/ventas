services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ventas_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - ventas
    depends_on:
      - mysql

  nginx:
    image: nginx:1.25-alpine
    container_name: ventas_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - ventas
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: ventas_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ventas
      MYSQL_USER: ventas
      MYSQL_PASSWORD: ventas_secret
      MYSQL_ROOT_PASSWORD: root_secret
    ports:
      - "3306:3306"
    volumes:
      - ventas_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - ventas

networks:
  ventas:
    driver: bridge

volumes:
  ventas_mysql_data:
